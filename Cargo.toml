[workspace]
members = [
    "crates/justrdp-core",
    "crates/justrdp-derive",
    "crates/justrdp-pdu",
    "crates/justrdp-bulk",
    "crates/justrdp-graphics",
    "crates/justrdp-input",
    "crates/justrdp-rdpfile",
    "crates/justrdp-connector",
    "crates/justrdp-acceptor",
    "crates/justrdp-server",
    "crates/justrdp-session",
    "crates/justrdp-svc",
    "crates/justrdp-dvc",
    "crates/justrdp-tls",
    "crates/justrdp-blocking",
    "crates/justrdp-tokio",
    "crates/justrdp-cliprdr",
    "crates/justrdp-rdpdr",
    "crates/justrdp-rdpsnd",
    "crates/justrdp-audio",
    "crates/justrdp-displaycontrol",
    "crates/justrdp-rdpeai",
    "crates/justrdp-rdpei",
    "crates/justrdp-rdpeusb",
    "crates/justrdp-rdpegt",
    "crates/justrdp-rdpevor",
    "crates/justrdp-rdpecam",
    "crates/justrdp-rdpev",
    "crates/justrdp-rdpedc",
    "crates/justrdp-rdpemc",
    "crates/justrdp-rdpepnp",
    "crates/justrdp-gateway",
    "crates/justrdp-rdpeudp",
    "crates/justrdp-rpch",
    "crates/justrdp-pkinit-card",
    "crates/justrdp-egfx",
    "crates/justrdp-rail",
    "crates/justrdp-rdpdr-native",
    "crates/justrdp-cliprdr-native",
    "crates/justrdp-rdpsnd-native",
    "crates/justrdp-rdpeai-native",
    "crates/justrdp-web",
    "tests/integration",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85.0"
license = "MIT OR Apache-2.0"
authors = ["Ki Hyun Park"]
repository = "https://github.com/justrdp/justrdp"
description = "A pure Rust, production-grade RDP protocol implementation"
keywords = ["rdp", "remote-desktop", "protocol"]
categories = ["network-programming"]

[workspace.dependencies]
justrdp-core = { path = "crates/justrdp-core", version = "0.1.0" }
justrdp-pdu = { path = "crates/justrdp-pdu", version = "0.1.0" }
