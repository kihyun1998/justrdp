[workspace]
members = [
    "crates/justrdp-core",
    "crates/justrdp-derive",
    "crates/justrdp-pdu",
    "crates/justrdp-bulk",
    "crates/justrdp-connector",
    "crates/justrdp-tls",
    "tests/integration",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85.0"
license = "MIT OR Apache-2.0"
authors = ["Ki Hyun Park"]
repository = "https://github.com/justrdp/justrdp"
description = "A pure Rust, production-grade RDP protocol implementation"
keywords = ["rdp", "remote-desktop", "protocol"]
categories = ["network-programming"]

[workspace.dependencies]
justrdp-core = { path = "crates/justrdp-core", version = "0.1.0" }
justrdp-pdu = { path = "crates/justrdp-pdu", version = "0.1.0" }
justrdp-bulk = { path = "crates/justrdp-bulk", version = "0.1.0" }
justrdp-connector = { path = "crates/justrdp-connector", version = "0.1.0" }
justrdp-derive = { path = "crates/justrdp-derive", version = "0.1.0" }
justrdp-tls = { path = "crates/justrdp-tls", version = "0.1.0" }
