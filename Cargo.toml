[workspace]
members = [
    "crates/justrdp-core",
    "crates/justrdp-derive",
    "crates/justrdp-pdu",
    "crates/justrdp-bulk",
    "crates/justrdp-graphics",
    "crates/justrdp-input",
    "crates/justrdp-rdpfile",
    "crates/justrdp-connector",
    "crates/justrdp-session",
    "crates/justrdp-svc",
    "crates/justrdp-dvc",
    "crates/justrdp-tls",
    "crates/justrdp-cliprdr",
    "crates/justrdp-rdpsnd",
    "tests/integration",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85.0"
license = "MIT OR Apache-2.0"
authors = ["Ki Hyun Park"]
repository = "https://github.com/justrdp/justrdp"
description = "A pure Rust, production-grade RDP protocol implementation"
keywords = ["rdp", "remote-desktop", "protocol"]
categories = ["network-programming"]

[workspace.dependencies]
justrdp-core = { path = "crates/justrdp-core", version = "0.1.0" }
justrdp-pdu = { path = "crates/justrdp-pdu", version = "0.1.0" }
justrdp-bulk = { path = "crates/justrdp-bulk", version = "0.1.0" }
justrdp-connector = { path = "crates/justrdp-connector", version = "0.1.0" }
justrdp-derive = { path = "crates/justrdp-derive", version = "0.1.0" }
justrdp-graphics = { path = "crates/justrdp-graphics", version = "0.1.0" }
justrdp-input = { path = "crates/justrdp-input", version = "0.1.0" }
justrdp-rdpfile = { path = "crates/justrdp-rdpfile", version = "0.1.0" }
justrdp-dvc = { path = "crates/justrdp-dvc", version = "0.1.0" }
justrdp-session = { path = "crates/justrdp-session", version = "0.1.0" }
justrdp-svc = { path = "crates/justrdp-svc", version = "0.1.0" }
justrdp-tls = { path = "crates/justrdp-tls", version = "0.1.0" }
justrdp-cliprdr = { path = "crates/justrdp-cliprdr", version = "0.1.0" }
justrdp-rdpsnd = { path = "crates/justrdp-rdpsnd", version = "0.1.0" }
