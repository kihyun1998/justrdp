[package]
name = "justrdp-rdpsnd"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Audio Output Virtual Channel (MS-RDPEA) for JustRDP"
keywords = ["rdp", "audio", "rdpsnd"]
categories = ["no-std", "network-programming"]

[features]
default = ["alloc"]
alloc = ["justrdp-core/alloc", "justrdp-svc/alloc", "justrdp-audio/alloc", "justrdp-dvc/alloc"]
std = ["alloc", "justrdp-core/std", "justrdp-svc/std", "justrdp-audio/std", "justrdp-dvc/std"]

[dependencies]
justrdp-core.workspace = true
justrdp-svc.workspace = true
justrdp-audio.workspace = true
justrdp-dvc.workspace = true
