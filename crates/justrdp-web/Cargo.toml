[package]
name = "justrdp-web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Transport-agnostic web/WASM bindings for JustRDP. Embedders plug in their own transport (WebSocket, WebTransport, gateway, native IPC) via the WebTransport trait."
keywords = ["rdp", "wasm", "websocket", "remote-desktop", "browser"]
categories = ["network-programming", "wasm"]

[features]
default = ["websocket"]
# Exposes the bundled `WebSocketTransport` (wasm32 + browser only). On
# non-wasm targets the gate is a no-op because `web-sys`/`wasm-bindgen`
# are declared only under `[target.'cfg(target_arch = "wasm32")']`.
websocket = []
# Exposes `NativeTcpTransport` ã a `tokio::net::TcpStream` wrapper that
# implements `WebTransport` directly (no wsproxy). Native targets only;
# the optional `tokio` dependency is pulled in here. On wasm32 the gate
# is a no-op because the `tokio` dep is declared under
# `[target.'cfg(not(target_arch = "wasm32"))']`.
native-tcp = ["dep:tokio"]
# Exposes `NativeTlsUpgrade` / `NativeTlsTransport` ã async TLS via
# `tokio-rustls` for the same `WebClient::connect_with_upgrade` path the
# WebSocket build uses. Implies `native-tcp` because the upgrader
# consumes a `NativeTcpTransport`.
native-tls = ["native-tcp", "dep:tokio-rustls"]
# Reserved for future reference transports. Activating today is a no-op
# but avoids a breaking-change feature add later.
webtransport = []
webrtc-data = []

[dependencies]
justrdp-core = { workspace = true, features = ["alloc"] }
justrdp-connector = { workspace = true }
justrdp-pdu.workspace = true
justrdp-session = { workspace = true, features = ["alloc"] }
justrdp-graphics = { workspace = true, features = ["alloc"] }
justrdp-cliprdr = { workspace = true, features = ["alloc"] }
justrdp-rdpsnd = { workspace = true, features = ["alloc"] }
justrdp-rdpeai = { workspace = true, features = ["alloc"] }
justrdp-audio = { workspace = true, features = ["alloc"] }
justrdp-svc = { workspace = true, features = ["alloc"] }
justrdp-dvc = { workspace = true, features = ["alloc"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# Optional native runtime. Only pulled in by the `native-tcp` feature
# (and any future native-only transports) ã wasm targets must never
# see it.
tokio = { version = "1", features = ["net", "io-util"], optional = true }
# Async TLS handshake driver. Pulls in `rustls 0.23` matching the
# version `justrdp-tls` already uses. Optional and behind
# `native-tls`.
tokio-rustls = { version = "0.26", optional = true, default-features = false, features = ["ring"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "BinaryType",
    "CanvasRenderingContext2d",
    "CloseEvent",
    "Element",
    "Event",
    "HtmlCanvasElement",
    "ImageData",
    "MessageEvent",
    "WebSocket",
] }
# `js` enables the browser-backed (`crypto.getRandomValues`) RNG impl,
# so `Config::client_random` can be filled without hand-rolling
# `web_sys::Crypto` calls in the facade.
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
pollster = "0.3"

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
# `rt` and `macros` are only needed by tests so they live here rather
# than in the `native-tcp` feature gate (keeps the runtime weight off
# native embedders that bring their own runtime).
tokio = { version = "1", features = ["net", "io-util", "rt", "macros"] }
