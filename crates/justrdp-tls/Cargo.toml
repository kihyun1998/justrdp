[package]
name = "justrdp-tls"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "TLS transport abstraction and backends for JustRDP"
keywords = ["rdp", "tls", "rustls"]
categories = ["network-programming"]

[features]
default = ["rustls-backend"]
rustls-backend = ["dep:rustls", "dep:webpki-roots"]
native-tls-backend = ["dep:native-tls"]

[dependencies]
rustls = { version = "0.23", optional = true, default-features = false, features = ["std", "tls12", "ring"] }
webpki-roots = { version = "0.26", optional = true }
native-tls = { version = "0.2", optional = true }
