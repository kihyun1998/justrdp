[package]
name = "justrdp-rdpsnd-native"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Native audio output backends (WASAPI/PulseAudio/CoreAudio) for JustRDP RDPSND"
keywords = ["rdp", "audio", "wasapi", "pulseaudio"]
categories = ["multimedia::audio"]

[dependencies]
justrdp-rdpsnd = { workspace = true, features = ["std"] }
justrdp-audio = { workspace = true, features = ["std"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "=0.59.0", features = [
    "Win32_Media_Audio",
    "Win32_System_Com",
] }

[target.'cfg(target_os = "linux")'.dependencies]
libpulse-binding = { version = "2.28", optional = true }
libpulse-simple-binding = { version = "2.28", optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
coreaudio-sys = { version = "0.2", optional = true, default-features = false, features = ["audio_unit", "audio_toolbox", "core_audio"] }

[features]
default = []
pulseaudio = ["dep:libpulse-binding", "dep:libpulse-simple-binding"]
coreaudio = ["dep:coreaudio-sys"]
