[package]
name = "justrdp"
description = "A from-scratch, sans-IO RDP client library."
edition.workspace = true
version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
justrdp-pdu.workspace = true
# The slow-path graphics codecs (slice-6): the session machine decodes bitmap rectangles
# through this crate's pure decode API (ADR-0003).
justrdp-codecs.workspace = true
# X.509 parsing (ADR-0002 leaf dependency). The sans-IO core extracts the server certificate's
# inner `subjectPublicKey` BIT STRING (not the whole SubjectPublicKeyInfo) for CredSSP to bind
# to; the handshake itself stays in the I/O adapter.
x509-cert.workspace = true

[dev-dependencies]
# Generates a throwaway self-signed cert so the key-extraction test can assert the extracted
# bytes are the inner subjectPublicKey (a strict subset of the key pair's full SPKI DER).
rcgen.workspace = true
# Differential oracle (ADR-0001): the MCS-stage machine tests build realistic *server* frames
# (Connect-Response, AttachUserConfirm, ChannelJoinConfirm) with ironrdp's encoders and feed
# them to our state machine — their encoder against our decoder, never our own bytes.
ironrdp-pdu = "0.8.0"
