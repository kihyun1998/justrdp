[package]
name = "justrdp-tokio"
description = "Tokio I/O adapter that drives the sans-IO justrdp connect/session state machines."
edition.workspace = true
version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
justrdp.workspace = true
justrdp-pdu.workspace = true
# "sync" + "macros" are lib (not just dev) features since slice-7: `run_session` selects over
# the socket and the host-input mpsc channel. Without them the lib only compiled via
# dev-dependency feature unification (tests passed, standalone `cargo check` did not).
tokio = { workspace = true, features = ["net", "io-util", "time", "sync", "macros"] }
# Cancel-aware session teardown (slice-8): the host signals stop via CancellationToken.
tokio-util = { workspace = true }
tracing = { workspace = true, features = ["std", "attributes"] }
# TLS upgrade (slice-2): the adapter owns the rustls handshake (the sans-IO core never sees TLS
# records — plan.md §3). `rustls` re-exported via `tokio-rustls`.
rustls = { workspace = true }
tokio-rustls = { workspace = true }
# NLA authentication (slice-3, plan.md decision 10): the adapter drives `sspi::credssp::CredSspClient`
# over the TLS stream; the sans-IO core never sees a TSRequest.
sspi = { workspace = true }

[dev-dependencies]
# "sync" feeds the SNI observed by the mock TLS server back to the test (oneshot channel).
tokio = { workspace = true, features = ["net", "io-util", "time", "rt", "macros", "sync"] }
# Captures tracing events in-test so we can assert on the emitted debug logs (criterion 14).
tracing-test = "0.2"
# The mock TLS server in the adapter tests presents a throwaway self-signed cert.
rcgen = { workspace = true }
# Differential oracle for the live-capture codec test (gate #6 fix note 3): bitmap rectangles
# captured from the real VM are decoded by both our codecs and ironrdp's (ADR-0003).
ironrdp-graphics = "0.8"
justrdp-codecs.workspace = true
