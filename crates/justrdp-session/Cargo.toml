[package]
name = "justrdp-session"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Active RDP session processing for JustRDP"
keywords = ["rdp", "session", "fast-path"]
categories = ["no-std", "network-programming"]

[features]
default = ["alloc"]
alloc = ["justrdp-core/alloc", "justrdp-pdu/alloc", "justrdp-bulk/alloc"]
std = ["alloc", "justrdp-core/std", "justrdp-pdu/std", "justrdp-bulk/std"]

[dependencies]
justrdp-core.workspace = true
justrdp-pdu.workspace = true
justrdp-bulk.workspace = true
