name: CI

# Minimal build gate: formatting, lints, and the (non-ignored) test suite.
# The real-VM integration tests (192.168.136.136) are `#[ignore]` and never run
# in CI — they need the throwaway Windows host, so they stay a maintainer step.
on:
  push:
    branches: [master]
  pull_request:

# One run per ref; a new push cancels an in-flight run on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default token gets read-only scope; grant write per-job only when needed.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # Use the runner's pre-installed rustup — no third-party toolchain action,
      # matching the project's dependency discipline (ADR-0002). The Rust version
      # is pinned in rust-toolchain.toml so a new release can't turn CI red on its
      # own; bumping is a deliberate, reviewed change.
      - name: Rust toolchain (pinned 1.96.0 + rustfmt + clippy)
        run: |
          rustup toolchain install 1.96.0 --no-self-update
          rustup default 1.96.0
          rustup component add rustfmt clippy
          rustc --version && cargo --version

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace
