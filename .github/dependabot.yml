# Watches crates.io weekly and opens bump PRs per dependency. Primary purpose: a new `sspi`
# release is the tripwire for issue #61 — evaluate dropping the ADR-0004 [patch.crates-io]
# fork-bridge (the bump PR must pass the real-VM suite per the ADR-0004 version-bump rule).
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
  # Keeps the GitHub Actions used by the fuzz + supply-chain workflows current. With actions
  # pinned to commit SHAs (ADR-0006), this is what makes SHA-pinning cheap: Dependabot opens the
  # bump PR with the new SHA and a version comment, so pins stay both immutable and up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
