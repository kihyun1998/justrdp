[package]
name = "justrdp-tauri"
description = "Tauri-based RDP client reference implementation for JustRDP"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "justrdp_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
default = []
# Slice E (TOFU trust): enables the dangerous_no_verify TLS path.
# Production builds MUST NOT pass this feature — Slice F's binary
# audit greps the output for the dangerous symbol; with this gate
# off, the symbol is not even compiled in.
dev-no-verify = []

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# JustRDP — pure-async client (v2) over native TCP/TLS/CredSSP.
justrdp-tokio = { workspace = true, features = ["native-nla"] }
justrdp-input = { workspace = true }
# Slice B (frame push): SessionEvent::Graphics reconstruction +
# BitmapRenderer + FrameSink trait. See src/sink.rs.
justrdp-async = { workspace = true }
# `websocket` feature is a no-op on non-wasm targets (gated behind
# `cfg(target_arch = "wasm32")` in justrdp-web/Cargo.toml), so the
# default feature set is fine here even though Tauri builds native.
justrdp-web = { workspace = true }
# Slice D2 (audio): SVC processor type + RDPSND client +
# platform-specific audio output backend. See src/audio.rs. ADR-0006:
# Tauri layer only touches NativeAudioOutput-shaped types; PDU-typed
# RDPSND symbols live in the rdpsnd / rdpsnd-native crates.
justrdp-svc = { workspace = true, features = ["alloc"] }
justrdp-rdpsnd = { workspace = true, features = ["std"] }
justrdp-rdpsnd-native = { workspace = true }
# Slice D1 (clipboard): SVC processor + native OS clipboard
# adapter (Windows clipboard-win / macOS objc2 / Linux x11+wayland
# behind features). Same ADR-0006 pattern as audio: this Tauri
# layer touches the wrapper only, never CLIPRDR PDU types.
justrdp-cliprdr = { workspace = true, features = ["std"] }
justrdp-cliprdr-native = { workspace = true }
# Slice E (TOFU trust): SHA-256 of SPKI + ServerCertVerifier trait.
# `justrdp-core` for the sha256 helper, `justrdp-tls` for the
# verifier trait + extract_spki_from_cert_der.
justrdp-core = { workspace = true, features = ["alloc"] }
justrdp-tls = { workspace = true }

tokio = { version = "1", features = ["sync", "rt-multi-thread", "macros"] }
base64 = "0.22"
# Slice E (TOFU trust store): JSON serde for the persisted host →
# SPKI map. `serde_json` is already pulled in via the existing
# `serde_json` dep above; no extra runtime dep needed.

[dev-dependencies]
# Slice E: TrustStore unit tests need a scratch directory that is
# cleaned up automatically.
tempfile = "3"
