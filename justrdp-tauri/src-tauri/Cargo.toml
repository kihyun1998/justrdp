[package]
name = "justrdp-tauri"
description = "Tauri-based RDP client reference implementation for JustRDP"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "justrdp_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# JustRDP — pure-async client (v2) over native TCP/TLS/CredSSP.
justrdp-tokio = { workspace = true, features = ["native-nla"] }
justrdp-input = { workspace = true }

tokio = { version = "1", features = ["sync", "rt-multi-thread", "macros"] }
base64 = "0.22"
